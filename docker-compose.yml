version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: brandlist_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brandlist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brandlist_password}
      POSTGRES_DB: ${POSTGRES_DB:-brandlist_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brandlist}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brandlist_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brandlist_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-brandlist}:${POSTGRES_PASSWORD:-brandlist_password}@db:5432/${POSTGRES_DB:-brandlist_db}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/venv  # Exclude venv from volume mount
    networks:
      - brandlist_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brandlist_frontend
    environment:
      # For local development, use localhost. For production, update this to your API URL
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - brandlist_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  brandlist_network:
    driver: bridge

