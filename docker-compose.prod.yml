version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: brandlist_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brandlist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brandlist_password}
      POSTGRES_DB: ${POSTGRES_DB:-brandlist_db}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # Only accessible from host, not external
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brandlist}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brandlist_network
    restart: unless-stopped
    # Memory limits for 1GB RAM server
    mem_limit: 400m
    mem_reservation: 256m
    cpus: 0.5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brandlist_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-brandlist}:${POSTGRES_PASSWORD:-brandlist_password}@db:5432/${POSTGRES_DB:-brandlist_db}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"  # Only accessible via Nginx
    volumes:
      - ./backend:/app
      - /app/venv
    networks:
      - brandlist_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Memory limits
    mem_limit: 300m
    mem_reservation: 200m
    cpus: 0.3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brandlist_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
      NODE_OPTIONS: "--max-old-space-size=384"  # Limit Node.js memory
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"  # Only accessible via Nginx
    networks:
      - brandlist_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Memory limits
    mem_limit: 400m
    mem_reservation: 300m
    cpus: 0.4

  nginx:
    image: nginx:alpine
    container_name: brandlist_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - brandlist_network
    restart: unless-stopped
    mem_limit: 64m
    mem_reservation: 32m
    cpus: 0.1

volumes:
  postgres_data:
  nginx_logs:

networks:
  brandlist_network:
    driver: bridge

