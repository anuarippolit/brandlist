# PostgreSQL configuration optimized for 1GB RAM server
# Minimal memory usage

# Memory settings (optimized for low RAM)
shared_buffers = 128MB
effective_cache_size = 256MB
maintenance_work_mem = 64MB
work_mem = 4MB

# WAL settings
wal_buffers = 4MB
min_wal_size = 128MB
max_wal_size = 512MB

# Checkpoint settings
checkpoint_completion_target = 0.9
max_wal_senders = 0

# Connection settings
max_connections = 50

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 2

# Logging (minimal for performance)
logging_collector = off
log_statement = 'none'
log_duration = off
log_line_prefix = ''

# Performance
synchronous_commit = off
fsync = on

